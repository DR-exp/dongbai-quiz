<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="300" fill="#2a1a2a"/>
  
  <!-- 紫色边框 -->
  <circle cx="150" cy="150" r="140" fill="none" stroke="#d464e8" stroke-width="4"/>
  
  <!-- 问号 -->
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#d464e8" text-anchor="middle">?</text>
  
  <!-- 角色名 -->
  <text x="150" y="200" font-family="Microsoft YaHei, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">彪姐</text>
  
  <!-- 装饰 -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#d464e8" stroke-width="1" opacity="0.3"/>
  <circle cx="150" cy="150" r="100" fill="none" stroke="#d464e8" stroke-width="1" opacity="0.3"/>
</svg>
